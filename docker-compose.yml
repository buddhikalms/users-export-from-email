services:
  mysql:
    image: mysql:8.4
    container_name: buddhi-email-extractor-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: buddhi_email_extractor
      MYSQL_USER: buddhi_user
      MYSQL_PASSWORD: buddhi_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ubuddhi_user", "-pbuddhi_password"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
