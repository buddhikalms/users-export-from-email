services:
  mysql:
    image: mysql:8.4
    container_name: outlook-sync-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: outlook_sync_exporter
      MYSQL_USER: outlook_user
      MYSQL_PASSWORD: outlook_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uoutlook_user", "-poutlook_password"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
